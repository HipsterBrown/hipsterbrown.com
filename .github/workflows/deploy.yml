name: Deploy to Dokku - production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOKKU_HOST: 'hipsterbrown.com'
  DOKKU_APP_NAME: 'hipsterbrown.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ELEVENTY_ENV: production

      - name: Upload sourcemaps
        run: |
          npx sentry-cli sourcemaps inject ./_site/assets/
          npx sentry-cli --url "$SENTRY_URL" sourcemaps --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" upload ./_site/assets
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}


      - name: Add static marker
        run: touch _site/.static

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Dokku host to known_hosts
        run: ssh-keyscan -p 22 ${{ env.DOKKU_HOST }} >> ~/.ssh/known_hosts

      - name: Push artifact to Dokku
        run: |
          cp CHECKS _site/
          cd _site
          git init
          git config user.email "deploy@github-actions"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force ssh://dokku@${{ env.DOKKU_HOST }}:22/${{ env.DOKKU_APP_NAME }} HEAD:main
