# local_backend: true
backend:
  name: github
  repo: hipsterbrown/hipsterbrown.com
  branch: main
  base_url: https://auth.hipsterbrown.com/
media_folder: "images/uploads"
publish_mode: editorial_workflow
display_url: https://hipsterbrown.com
logo:
  src: https://hipsterbrown.com/images/Logo.png
  show_in_header: true
collections:
  - name: "training-data"
    label: "Training Data"
    folder: "training-data"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields:
      - 'date'
      - 'title'
      - 'slug'
    editor:
      preview: false
    fields:
      - { name: "draft", label: "Draft", widget: "boolean", default: false }
      - { name: "date", label: "Date", widget: "datetime", required: true }
      - { name: "title", label: "Title", widget: "string", required: true }
      - { name: "description", label: "Description", widget: "string", required: true }
      - name: "templateEngineOverride"
        label: "Template Engine"
        widget: "select"
        required: false
        default:
          - { label: "Markdown", value: "md" }
        options:
          - { label: "Markdown", value: "md" }
          - { label: "Liquid", value: "md, miquid" }
      - name: "type"
        label: "Type"
        widget: "select"
        required: true
        options:
          - { label: "Long Form", value: "long-form" }
          - { label: "TIL", value: "til" }
          - { label: "Link", value: "link" }
          - { label: "Note", value: "note" }
          - { label: "Talk", value: "talk" }
          - { label: "Video", value: "video" }
          - { label: "Audio", value: "audio" }
      - { name: "tags", label: "Tags", widget: "list" }
      - { name: "body", label: "Body", widget: "markdown" }
  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields:
      - 'date'
      - 'title'
    editor:
      preview: false
    fields:
      - { name: "title", label: "Title", widget: "string", required: true }
      - { name: "date", label: "Date", widget: "datetime", required: true }
      - { name: "description", label: "Description", widget: "string", required: true }
      - { name: "status", label: "Status", widget: "select", options: ["idea", "building", "finished", "archived"], default: "idea" }
      - { name: "stack", label: "Stack", widget: "list" }
      - { name: "repo", label: "Repo URL", widget: "string", required: false }
      - { name: "body", label: "Body", widget: "markdown" }
  - name: "speaking"
    label: "Speaking"
    folder: "speaking"
    create: true
    slug: "{{slug}}"
    sortable_fields:
      - 'date'
      - 'title'
    editor:
      preview: false
    fields:
      - { name: "title", label: "Title", widget: "string", required: true }
      - { name: "event", label: "Event", widget: "string", required: true }
      - { name: "date", label: "Date", widget: "datetime", required: true }
      - { name: "location", label: "Location", widget: "string", required: false }
      - { name: "link", label: "Link", widget: "string", required: false }
      - { name: "body", label: "Body", widget: "markdown" }
