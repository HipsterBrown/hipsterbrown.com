---
permalink: "{{ categories | join: '/' }}/{{ page.fileSlug }}/"
highlight: true
---

{% include "header.html" %}

{% if draft %}
<div class="draft-banner" role="alert">Draft — not published</div>
{% endif %}
<header class="post-header">
  <div class="container">
    {% if type %}<span class="post-type-badge type-{{ type }}">{{ type }}</span>{% endif %}
    <h1>{{ title }}</h1>
    <p class="mono post-meta">{{ page.date | date: "%B %e, %Y" }}</p>
  </div>
</header>

<main id="main" tabindex="-1" class="container post-body">
  <div class="prose">
    {{ content }}
  </div>
</main>

{% include "footer.html" %}
