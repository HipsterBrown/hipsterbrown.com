---
layout: default
---
<article class="container thin">
  <h1>{{ title }}</h1>
  {% if event %}<p class="event">{{ event }}</p>{% endif %}
  {% if description %}<p>{{ description }}</p>{% endif %}
  <div class="links">
    {% if recording_url %}<a href="{{ recording_url }}">Watch recording</a>{% endif %}
    {% if slides_url %}<a href="{{ slides_url }}">View slides</a>{% endif %}
  </div>
  {{ content }}
</article>
